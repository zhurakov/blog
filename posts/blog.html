<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css?v=home-link" />
    <style>
      html,
      body {
        height: 100%;
        min-height: 100vh;
        margin: 0;
      }
      body {
        --s: 100px; /* control the size */
        --c1: #c3ccaf;
        --c2: #67434f;

        --_s: calc(2 * var(--s)) calc(2 * var(--s));
        --_g: var(--_s) conic-gradient(at 40% 40%, #0000 75%, var(--c1) 0);
        --_p: var(--_s) conic-gradient(at 20% 20%, #0000 75%, var(--c2) 0);
        background:
          calc(0.9 * var(--s)) calc(0.9 * var(--s)) / var(--_p),
          calc(-0.1 * var(--s)) calc(-0.1 * var(--s)) / var(--_p),
          calc(0.7 * var(--s)) calc(0.7 * var(--s)) / var(--_g),
          calc(-0.3 * var(--s)) calc(-0.3 * var(--s)) / var(--_g),
          conic-gradient(from 90deg at 20% 20%, var(--c2) 25%, var(--c1) 0) 0
            0 / var(--s) var(--s);
        animation: m 3s infinite;
      }
      @keyframes m {
        0% {
          background-position:
            calc(0.9 * var(--s)) calc(0.9 * var(--s)),
            calc(-0.1 * var(--s)) calc(-0.1 * var(--s)),
            calc(0.7 * var(--s)) calc(0.7 * var(--s)),
            calc(-0.3 * var(--s)) calc(-0.3 * var(--s)),
            0 0;
        }
        25% {
          background-position:
            calc(1.9 * var(--s)) calc(0.9 * var(--s)),
            calc(-1.1 * var(--s)) calc(-0.1 * var(--s)),
            calc(1.7 * var(--s)) calc(0.7 * var(--s)),
            calc(-1.3 * var(--s)) calc(-0.3 * var(--s)),
            0 0;
        }
        50% {
          background-position:
            calc(1.9 * var(--s)) calc(-0.1 * var(--s)),
            calc(-1.1 * var(--s)) calc(0.9 * var(--s)),
            calc(1.7 * var(--s)) calc(-0.3 * var(--s)),
            calc(-1.3 * var(--s)) calc(0.7 * var(--s)),
            0 0;
        }
        75% {
          background-position:
            calc(2.9 * var(--s)) calc(-0.1 * var(--s)),
            calc(-2.1 * var(--s)) calc(0.9 * var(--s)),
            calc(2.7 * var(--s)) calc(-0.3 * var(--s)),
            calc(-2.3 * var(--s)) calc(0.7 * var(--s)),
            0 0;
        }
        100% {
          background-position:
            calc(2.9 * var(--s)) calc(-1.1 * var(--s)),
            calc(-2.1 * var(--s)) calc(1.9 * var(--s)),
            calc(2.7 * var(--s)) calc(-1.3 * var(--s)),
            calc(-2.3 * var(--s)) calc(1.7 * var(--s)),
            0 0;
        }
      }
    </style>
    <title>Blog</title>
  </head>

  <body>
    <a class="home-link" href="../index.html">← Home</a>

    <main>
      <header>
        <h1 class="neon-text">In progress...</h1>
      </header>
    </main>

    <footer>
      <div class="footer-row">
        <a href="../index.html" class="brand-label">
          <img src="../images/indie-coder.png" alt="Whoami brand" />
        </a>

        <a
          class="github-footer-link"
          href="https://github.com/zhurakov/blog"
          rel="me"
        >
          <img src="../images/github-lockup-white.svg" alt="GitHub" />
        </a>

        <p class="copyright">
          <a
            class="cc-link"
            rel="license"
            href="https://creativecommons.org/licenses/by-sa/4.0/"
          >
            CC BY-SA 4.0
          </a>
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/cc.svg"
            alt="CC"
          />
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/by.svg"
            alt="BY"
          />
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/sa.svg"
            alt="SA"
          />
        </p>
      </div>
    </footer>
  </body>
</html>
