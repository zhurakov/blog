<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music</title>
    <link rel="stylesheet" href="../css/styles.css?v=home-link" />
    <link rel="shortcut icon" href="../images/indie-coder.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family: monospace;
        color: white;
      }

      body {
        background-color: #000;
        overflow: hidden;
      }

      #backgroundVideo {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        z-index: -1;
      }

      header {
        position: fixed;
        top: 10px;
        left: 0;
        right: 0;
        text-align: center;
        z-index: 2;
        pointer-events: none;
      }

      header h1 {
        font-family: "Courier New", monospace;
        font-size: 40px;
        line-height: 1;
        color: #b85212;
      }

      main {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 1;
        position: relative;
      }

      .play-button {
        display: inline-block;
        padding: 10px 24px;
        background-color: #389984;
        color: #000;
        text-decoration: none;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        font-size: 16px;
      }

      .play-button.playing {
        background-color: #b85212;
        color: #fff;
      }

      .status-message {
        margin-top: 12px;
        min-height: 1.2em;
        font-size: 14px;
        color: #fff;
      }

      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 4px 0;
        z-index: 9;
        background: rgba(0, 0, 0, 0.5);
      }

      .footer-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      footer .brand-label img {
        height: 32px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      footer a.cc-link {
        text-decoration: none;
        color: inherit;
      }

      footer img.cc-icon {
        max-width: 1em;
        max-height: 1em;
        margin-left: 0.2em;
        vertical-align: middle;
      }

      footer p {
        margin: 0;
      }

      @media (max-width: 600px) {
        header h1 {
          font-size: 28px;
        }

        .play-button {
          padding: 8px 18px;
          font-size: 14px;
        }

        footer .brand-label img {
          height: 24px;
        }

        #backgroundVideo {
          object-position: 20% center; /* подстрой 10/30% по вкусу */
        }

        main {
          justify-content: flex-start;
          padding-top: 10vh; /* играйся 35–45vh */
        }
      }
    </style>
  </head>

  <body>
    <a class="home-link" href="../index.html">← Home</a>

    <video id="backgroundVideo" autoplay loop muted playsinline>
      <source
        src="https://coderadio.freecodecamp.org/static/media/Saron3.cb9bbffcf0eaef69b98b.webm"
        type="video/webm"
      />
    </video>

    <audio id="radio" src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

    <header>
      <h1>Radio room</h1>
    </header>

    <main>
      <article>
        <button class="play-button" id="playToggle">▶ Play radio</button>
        <p class="status-message" id="statusMessage" aria-live="polite"></p>
      </article>
    </main>

    <footer>
      <div class="footer-row">
        <a href="../index.html" class="brand-label">
          <img src="../images/indie-coder.png" alt="Whoami brand" />
        </a>

        <a
          class="github-footer-link"
          href="https://github.com/zhurakov/blog"
          rel="me"
        >
          <img src="../images/github-lockup-white.svg" alt="GitHub" />
        </a>

        <p class="copyright">
          <a
            class="cc-link"
            rel="license"
            href="https://creativecommons.org/licenses/by-sa/4.0/"
          >
            CC BY-SA 4.0
          </a>
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/cc.svg"
            alt="CC"
          />
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/by.svg"
            alt="BY"
          />
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/sa.svg"
            alt="SA"
          />
        </p>
      </div>
    </footer>

    <script>
      const audio = document.getElementById("radio");
      const playToggle = document.getElementById("playToggle");
      const statusMessage = document.getElementById("statusMessage");
      const playlist = [
        "https://stream.zeno.fm/0r0xa792kwzuv",
        "../audio/turnontheradio.mp3",
        "../audio/bluesunday.mp3",
      ];

      let isPlaying = false;
      let sourceIndex = 0;

      function updateButton(playing) {
        isPlaying = playing;
        playToggle.classList.toggle("playing", playing);
        playToggle.textContent = playing ? "⏸ Pause radio" : "▶ Play radio";
      }

      function setStatus(message) {
        statusMessage.textContent = message;
      }

      async function playCurrentSource() {
        if (audio.src !== new URL(playlist[sourceIndex], window.location.href).href) {
          audio.src = playlist[sourceIndex];
          audio.load();
        }

        await audio.play();
      }

      playToggle.addEventListener("click", async () => {
        try {
          if (!isPlaying) {
            await playCurrentSource();
            updateButton(true);
            setStatus(sourceIndex === 0 ? "" : "Remote stream unavailable, using local audio.");
          } else {
            audio.pause();
            updateButton(false);
            setStatus("");
          }
        } catch (e) {
          if (sourceIndex < playlist.length - 1) {
            sourceIndex += 1;
            setStatus("Stream unavailable, trying backup audio...");
            try {
              await playCurrentSource();
              updateButton(true);
              setStatus("Remote stream unavailable, using local audio.");
              return;
            } catch (fallbackError) {
              console.error(fallbackError);
            }
          }

          updateButton(false);
          setStatus("Audio is unavailable right now.");
          console.error(e);
        }
      });

      audio.addEventListener("ended", () => {
        updateButton(false);
      });

      audio.addEventListener("error", () => {
        updateButton(false);
        if (sourceIndex < playlist.length - 1) {
          setStatus("Playback failed. Press play to try backup audio.");
        } else {
          setStatus("Audio is unavailable right now.");
        }
      });
    </script>
  </body>
</html>
