  <body>
    <a class="home-link" href="../index.html">← Home</a>

    <video id="backgroundVideo" autoplay loop muted playsinline>
      <source
        src="https://coderadio.freecodecamp.org/static/media/Saron3.cb9bbffcf0eaef69b98b.webm"
        type="video/webm"
      />
    </video>

    <audio id="radio" src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

    <header>
      <h1>Radio room</h1>
    </header>

    <main>
      <article>
        <button class="play-button" id="playToggle">▶ Play radio</button>
        <p class="status-message" id="statusMessage" aria-live="polite"></p>
      </article>
    </main>

    <footer>
      <div class="footer-row">
        <a href="../index.html" class="brand-label">
          <img src="../images/indie-coder.png" alt="Whoami brand" />
        </a>

        <a
          class="github-footer-link"
          href="https://github.com/zhurakov/blog"
          rel="me"
        >
          <img src="../images/github-lockup-white.svg" alt="GitHub" />
        </a>

            CC BY-SA 4.0
          </a>

            alt="CC"
          />

            alt="BY"
          />
          <img
            class="cc-icon"
            src="https://mirrors.creativecommons.org/presskit/icons/sa.svg"
            alt="SA"
          />
        </p>
      </div>
    </footer>

    <script>
      const backgroundVideo = document.getElementById("backgroundVideo");
      const audio = document.getElementById("radio");
      const playToggle = document.getElementById("playToggle");
      const statusMessage = document.getElementById("statusMessage");
      const playlist = [
        "https://stream.zeno.fm/0r0xa792kwzuv",
        "../audio/turnontheradio.mp3",
        "../audio/bluesunday.mp3",
      ];

      let isPlaying = false;
      let sourceIndex = 0;

      backgroundVideo.play().catch(() => {});

      function updateButton(playing) {
        isPlaying = playing;
        playToggle.classList.toggle("playing", playing);
        playToggle.textContent = playing ? "⏸ Pause radio" : "▶ Play radio";
      }

      function setStatus(message) {
        statusMessage.textContent = message;
      }

      async function playCurrentSource() {
        if (audio.src !== new URL(playlist[sourceIndex], window.location.href).href) {
          audio.src = playlist[sourceIndex];
          audio.load();
        }

        await audio.play();
      }

      playToggle.addEventListener("click", async () => {
        try {
          if (!isPlaying) {
            await playCurrentSource();
            updateButton(true);
            setStatus(sourceIndex === 0 ? "" : "Remote stream unavailable, using local audio.");
          } else {
            audio.pause();
            updateButton(false);
            setStatus("");
          }
        } catch (e) {
          if (sourceIndex < playlist.length - 1) {
            sourceIndex += 1;
            setStatus("Stream unavailable, trying backup audio...");
            try {
              await playCurrentSource();
              updateButton(true);
              setStatus("Remote stream unavailable, using local audio.");
              return;
            } catch (fallbackError) {
              console.error(fallbackError);
            }
          }

          updateButton(false);
          setStatus("Audio is unavailable right now.");
          console.error(e);
        }
      });

      audio.addEventListener("ended", () => {
        updateButton(false);
      });

      audio.addEventListener("error", () => {
        updateButton(false);
        if (sourceIndex < playlist.length - 1) {
          setStatus("Playback failed. Press play to try backup audio.");
        } else {
          setStatus("Audio is unavailable right now.");
        }
      });
    </script>
  </body>
</html>
