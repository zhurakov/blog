function pixelTex(palette, map, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const id  = ctx.createImageData(size, size);
  for (let i = 0; i < map.length; i++) {
    const rgb = palette[map[i]];
    id.data[i*4]   = (rgb >> 16) & 0xff;
    id.data[i*4+1] = (rgb >>  8) & 0xff;
    id.data[i*4+2] =  rgb        & 0xff;
    id.data[i*4+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function grassMats(w, d) {
  const rx = Math.max(1, Math.floor(w/2));
  const rz = Math.max(1, Math.floor(d/2));
  const mk = (tex, rx2, rz2) => {
    const t = tex.clone(); t.repeat.set(rx2, rz2); t.needsUpdate = true;
    return new THREE.MeshLambertMaterial({ map: t });
  };
  return [
    mk(TEX.grassSide, rx, 1), mk(TEX.grassSide, rx, 1),
    mk(TEX.grassTop,  rx, rz), mk(TEX.stone, rx, rz),
    mk(TEX.grassSide, rz, 1), mk(TEX.grassSide, rz, 1),
  ];
}

  cloud: new THREE.MeshLambertMaterial({ map: TEX.cloud, transparent: true, opacity: 0.92 }),

// ═══════════════════════════════════════════════════════════
//  PLATFORM
// ═══════════════════════════════════════════════════════════

function buildPlatform(def) {
  const { w, d, type } = def;
  const geo = new THREE.BoxGeometry(w, 0.7, d);
  const mat = type === 'grass' ? grassMats(w, d) : (MAT[type] || MAT.stone);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(def.x, def.y, def.z);
  mesh.receiveShadow = true;
  mesh.castShadow = type !== 'lava';
  mesh.userData = {
    baseX: def.x, baseY: def.y, baseZ: def.z,
    moveAxis:  def.moveAxis  || null,
    moveRange: def.moveRange || 0,
    moveSpeed: def.moveSpeed || 1,
    phase: Math.random() * Math.PI * 2,
    noCollide: !!def.noCollide,
    isIce: type === 'ice',
  };
  return mesh;
}

function buildCoin(x, y, z) {
  const g = new THREE.Group();
  g.position.set(x, y, z);
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.22, 0.09, 10),
    new THREE.MeshLambertMaterial({ color: 0xffd700, emissive: 0x443300, emissiveIntensity: 0.4 })
  );
  g.add(body);
  const mark = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.11, 0.14),
    new THREE.MeshLambertMaterial({ color: 0xff8800 })
  );
  g.add(mark);
  g.userData.collected = false;
  g.userData.baseY = y;
  return g;
}

    new THREE.TorusGeometry(0.55, 0.06, 8, 20),

  g.userData.ring = ring;
  g.userData.light = pl;
  return g;
}

function buildShadowBlob() {
  const blob = new THREE.Mesh(
    new THREE.CircleGeometry(0.35, 12),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35, depthWrite: false })
  );
  blob.rotation.x = -Math.PI / 2;
  return blob;
}

// ═══════════════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════════════

function buildStars() {
  const N = 600, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random()-0.5)*300;
    pos[i*3+1] = Math.random()*120+5;
    pos[i*3+2] = (Math.random()-0.5)*300;
    const b = 0.5+Math.random()*0.5;
    col[i*3]=b; col[i*3+1]=b; col[i*3+2]=b+Math.random()*0.3;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  return new THREE.Points(geo, new THREE.PointsMaterial({ size:0.25, vertexColors:true, sizeAttenuation:true }));
}

const particles = [];

function spawnParticles(pos, count, color, spread, speed, life) {
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.12, 0.12),
      new THREE.MeshBasicMaterial({ color, transparent: true })
    );
    mesh.position.copy(pos);
    const pv = new THREE.Vector3(
      (Math.random()-0.5)*spread,
      Math.random()*speed + speed*0.3,
      (Math.random()-0.5)*spread
    );
    scene.add(mesh);
    particles.push({ mesh, vel: pv, life, maxLife: life });
  }
}

function spawnDust(pos)       { spawnParticles(pos, 6, 0xaa8866, 2.5, 1.5, 0.35); }
function spawnCoinBurst(pos)  { spawnParticles(pos, 10, 0xffdd00, 3, 3, 0.5); spawnParticles(pos, 5, 0xff8800, 2, 2.5, 0.4); }
function spawnDeathBurst(pos) { spawnParticles(pos, 12, 0xff2222, 4, 4, 0.6); spawnParticles(pos, 8, 0xff8800, 3, 3, 0.5); }
function spawnConfetti(pos)   { [0xff2222,0x22ff88,0x2288ff,0xffdd00,0xff88ff].forEach(c=>spawnParticles(pos,6,c,5,6,0.8)); }

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); continue; }
    p.vel.y -= 12*dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.rotation.x += 5*dt; p.mesh.rotation.z += 3*dt;
    const t = p.life/p.maxLife;
    p.mesh.material.opacity = t;
    p.mesh.scale.setScalar(0.5+t*0.5);
  }
}

let _ac = null;
function getAC() { if (!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)(); return _ac; }

function beep(freq, type, dur, vol, slide) {
  try {
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type;
    o.frequency.setValueAtTime(freq, ac.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, ac.currentTime+dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur+0.01);
  } catch(_) {}
}

const sfx = {
  jump: () => beep(280,'square',0.12,0.1,140),
  coin: () => { beep(880,'sine',0.12,0.12); setTimeout(()=>beep(1320,'sine',0.12,0.1),60); },
  land: () => beep(80,'sine',0.08,0.15,40),
  die:  () => { beep(220,'sawtooth',0.08,0.15,110); setTimeout(()=>beep(110,'sawtooth',0.3,0.12,55),80); },
  win:  () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.22,0.12),i*110)),
};

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

const touch = { axisX:0, axisY:0, active:false };
const touchInput = {
  id:null,
  startX:0,
  startY:0,
  moved:false,
};
const touchCamera = {
  id:null,
  startX:0,
  lastX:0,
  moved:false,
  axis:0,
};
const TOUCH_DEADZONE = 10;
const TOUCH_RADIUS = 64;
const TOUCH_CAMERA_RADIUS = 96;

function resetTouchMove() {
  touch.axisX=0;
  touch.axisY=0;
  touch.active=false;
  touchInput.id=null;
  touchInput.moved=false;
}

function resetTouchCamera() {
  touchCamera.id=null;
  touchCamera.startX=0;
  touchCamera.lastX=0;
  touchCamera.moved=false;
  touchCamera.axis=0;
}

function updateTouchMove(t) {
  const dx=t.clientX-touchInput.startX;
  const dy=t.clientY-touchInput.startY;
  const dist=Math.hypot(dx,dy);
  if (dist<TOUCH_DEADZONE&&!touchInput.moved) return;
  touchInput.moved=true;
  touch.active=true;
  const mag=Math.min(1,dist/TOUCH_RADIUS);
  const ang=Math.atan2(dy,dx);
  touch.axisX=Math.cos(ang)*mag;
  touch.axisY=-Math.sin(ang)*mag;
}

function updateTouchCamera(t) {
  const dx=t.clientX-touchCamera.startX;
  if (Math.abs(dx)<TOUCH_DEADZONE&&!touchCamera.moved) return;
  touchCamera.moved=true;
  touchCamera.lastX=t.clientX;
  touchCamera.axis=Math.max(-1,Math.min(1,dx/TOUCH_CAMERA_RADIUS));
}

function handleTouchStart(e) {
  if (state!=='playing') return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touchInput.id===null) {
      touchInput.id=t.identifier;
      touchInput.startX=t.clientX;
      touchInput.startY=t.clientY;
      touchInput.moved=false;
    } else if (touchCamera.id===null) {
      touchCamera.id=t.identifier;
      touchCamera.startX=t.clientX;
      touchCamera.lastX=t.clientX;
      touchCamera.moved=false;
      touchCamera.axis=0;
    } else {
      jumpBuffer=0.18;
    }
  }
}

function handleTouchMove(e) {
  if (state!=='playing') return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===touchInput.id) updateTouchMove(t);
    if (t.identifier===touchCamera.id) updateTouchCamera(t);
  }
}

function handleTouchEnd(e) {
  if (touchInput.id===null&&touchCamera.id===null) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===touchInput.id) {
      if (!touchInput.moved&&state==='playing') jumpBuffer=0.18;
      resetTouchMove();
    }
    if (t.identifier===touchCamera.id) {
      if (!touchCamera.moved&&state==='playing') jumpBuffer=0.18;
      resetTouchCamera();
    }
  }
}

if ('ontouchstart' in window) {
  document.addEventListener('touchstart', handleTouchStart, { passive:false });
  document.addEventListener('touchmove', handleTouchMove, { passive:false });
  document.addEventListener('touchend', handleTouchEnd, { passive:false });
  document.addEventListener('touchcancel', handleTouchEnd, { passive:false });
}

let levelIdx=0, score=0, lives=3;
let state='title';

let platformMeshes=[], coinMeshes=[];
let goalMesh=null, playerMesh=null, shadowBlob=null, stars=null;
let currentPlatform=null;

const vel      = new THREE.Vector3();
let onGround   = false;
let wasOnGround= false;
let coyoteTime = 0;
let jumpBuffer = 0;
let isOnIce    = false;

let camYaw = 0;
const camPos    = new THREE.Vector3(0, 6, 12);
const camLookAt = new THREE.Vector3();

let levelTimer=0, timerRunning=false;
const bestTimes={};

const raycaster = new THREE.Raycaster();
const downVec   = new THREE.Vector3(0,-1,0);

// ═══════════════════════════════════════════════════════════
//  LOAD LEVEL
// ═══════════════════════════════════════════════════════════

function clearLevel() {
  platformMeshes.forEach(m=>scene.remove(m));
  coinMeshes.forEach(m=>scene.remove(m));
  if(goalMesh)   scene.remove(goalMesh);
  if(playerMesh) scene.remove(playerMesh);
  if(shadowBlob) scene.remove(shadowBlob);
  if(stars)      scene.remove(stars);
  particles.forEach(p=>scene.remove(p.mesh));
  platformMeshes=[]; coinMeshes=[]; particles.length=0;
  goalMesh=playerMesh=shadowBlob=stars=null;
}

function loadLevel(idx) {
  clearLevel();
  const lvl = LEVELS[idx];
  scene.background = new THREE.Color(lvl.sky);
  scene.fog = new THREE.Fog(lvl.fog, 35, 90);
  setupLights(lvl);

  stars=buildStars(); scene.add(stars);

  for (const def of lvl.platforms) {
    const m=buildPlatform(def); scene.add(m); platformMeshes.push(m);
  }
  for (const c of lvl.coins) {
    const m=buildCoin(c.x,c.y,c.z); scene.add(m); coinMeshes.push(m);
  }
  goalMesh=buildGoal(new THREE.Vector3(lvl.goal.x,lvl.goal.y,lvl.goal.z));
  scene.add(goalMesh);

  playerMesh=buildPlayer();
  playerMesh.position.set(lvl.start.x,lvl.start.y,lvl.start.z);
  scene.add(playerMesh);

  shadowBlob=buildShadowBlob(); scene.add(shadowBlob);

  vel.set(0,0,0);
  onGround=wasOnGround=false;
  coyoteTime=jumpBuffer=0; isOnIce=false; currentPlatform=null;
  levelTimer=0; timerRunning=false;
  state='playing';
  hideMsg(); updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════

const PLAYER_W=0.5, PLAYER_H=1.3, PLAYER_D=0.4;
const playerBox=new THREE.Box3(), platBox=new THREE.Box3();

function resolveCollisions() {
  onGround=false; isOnIce=false; currentPlatform=null;
  playerBox.setFromCenterAndSize(
    new THREE.Vector3(playerMesh.position.x, playerMesh.position.y+PLAYER_H/2, playerMesh.position.z),
    new THREE.Vector3(PLAYER_W*2, PLAYER_H, PLAYER_D*2)
  );
  for (const p of platformMeshes) {
    if (p.userData.noCollide) continue;
    platBox.setFromObject(p);
    if (!playerBox.intersectsBox(platBox)) continue;
    const pc=playerBox.getCenter(new THREE.Vector3());
    const sc=platBox.getCenter(new THREE.Vector3());
    const phs=playerBox.getSize(new THREE.Vector3()).multiplyScalar(0.5);
    const shs=platBox.getSize(new THREE.Vector3()).multiplyScalar(0.5);
    const ox=phs.x+shs.x-Math.abs(pc.x-sc.x);
    const oy=phs.y+shs.y-Math.abs(pc.y-sc.y);
    const oz=phs.z+shs.z-Math.abs(pc.z-sc.z);
    if (ox<=0||oy<=0||oz<=0) continue;
    if (oy<=ox&&oy<=oz) {
      if (pc.y>sc.y) {
        playerMesh.position.y+=oy;
        if (vel.y<0) { vel.y=0; onGround=true; currentPlatform=p; isOnIce=p.userData.isIce; }
      } else { playerMesh.position.y-=oy; if(vel.y>0) vel.y=0; }
    } else if (ox<=oz) {
      playerMesh.position.x+=pc.x>sc.x?ox:-ox; vel.x=0;
    } else {
      playerMesh.position.z+=pc.z>sc.z?oz:-oz; vel.z=0;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  SHADOW BLOB
// ═══════════════════════════════════════════════════════════

function updateShadowBlob() {
  raycaster.set(playerMesh.position.clone().add(new THREE.Vector3(0,0.5,0)), downVec);
  const hits=raycaster.intersectObjects(platformMeshes.filter(p=>!p.userData.noCollide));
  if (hits.length>0) {
    const h=hits[0];
    shadowBlob.position.set(playerMesh.position.x, h.point.y+0.02, playerMesh.position.z);
    const s=Math.max(0,1-h.distance/8);
    shadowBlob.scale.setScalar(s*1.5+0.3);
    shadowBlob.material.opacity=s*0.4;
    shadowBlob.visible=true;
  } else { shadowBlob.visible=false; }
}


// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════

function updateCamera(dt) {
  if (keys['KeyQ']) camYaw+=1.8*dt;
  if (keys['KeyE']) camYaw-=1.8*dt;
  if (touchCamera.axis) camYaw-=touchCamera.axis*2.2*dt;

  const lookAhead=new THREE.Vector3(vel.x,0,vel.z);
  if (lookAhead.length()>0.1) lookAhead.normalize().multiplyScalar(2);

  const targetLook=new THREE.Vector3(
    playerMesh.position.x+lookAhead.x,
    playerMesh.position.y+0.5,
    playerMesh.position.z+lookAhead.z
  );
  camLookAt.lerp(targetLook, Math.min(1,5*dt));

  const tx=playerMesh.position.x+Math.sin(camYaw)*10;
  const ty=playerMesh.position.y+5;
  const tz=playerMesh.position.z+Math.cos(camYaw)*10;
  camPos.lerp(new THREE.Vector3(tx,ty,tz), Math.min(1,5*dt));
  camera.position.copy(camPos);
  camera.lookAt(camLookAt);
}

// ═══════════════════════════════════════════════════════════
//  PAUSE
// ═══════════════════════════════════════════════════════════

function togglePause() {
  if (state==='playing') {
    state='paused'; pauseScreen.classList.add('show');
  } else if (state==='paused') {
    state='playing'; pauseScreen.classList.remove('show');
  }
}

function startGame() {
  titleScreen.classList.remove('show');
  loadLevel(0);
}

function advanceState() {
  if (state==='dead')          loadLevel(levelIdx);
  else if (state==='gameover') { score=0;lives=3;levelIdx=0;loadLevel(0); }
  else if (state==='levelcomplete') {
    if (levelIdx+1>=LEVELS.length) { score=0;lives=3;levelIdx=0;loadLevel(0); }
    else { levelIdx++; loadLevel(levelIdx); }
  }
  else if (state==='win') { score=0;lives=3;levelIdx=0;loadLevel(0); }
}

// ═══════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.code==='Escape') {
    if (state==='playing'||state==='paused') { togglePause(); return; }
  }
  if (e.code==='Space') {
    if (state==='title')         { startGame(); return; }
    if (state==='paused')        { togglePause(); return; }
    if (state==='playing')       { jumpBuffer=0.18; return; }
    advanceState();
  }
});

// ═══════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════

const SPEED=6.5, GRAV=24, JUMP_V=10;

function update(dt) {
  if (state==='title'||state==='paused') return;
  if (state!=='playing') return;

  const lvl    = LEVELS[levelIdx];
  const elapsed = performance.now()/1000;

  // ── Input direction ──
  const fwdV  = new THREE.Vector3(-Math.sin(camYaw),0,-Math.cos(camYaw));
  const rgtV  = new THREE.Vector3( Math.cos(camYaw),0,-Math.sin(camYaw));
  const dir   = new THREE.Vector3();
  if (keys['KeyW']||keys['ArrowUp'])   dir.add(fwdV);
  if (keys['KeyS']||keys['ArrowDown']) dir.sub(fwdV);
  if (keys['KeyA'])                    dir.sub(rgtV);
  if (keys['KeyD'])                    dir.add(rgtV);
  if (touch.active) {
    dir.add(fwdV.clone().multiplyScalar(touch.axisY));
    dir.add(rgtV.clone().multiplyScalar(touch.axisX));
  }
  if (dir.lengthSq()>1) dir.normalize();
  const moving=dir.lengthSq()>0.01;

  // ── Timer ──
  if (!timerRunning&&(moving||keys['Space']||jumpBuffer>0)) timerRunning=true;
  if (timerRunning) { levelTimer+=dt; elTimer.textContent=fmtTime(levelTimer); }

  // ── Moving platforms ──
  for (const p of platformMeshes) {
    const ud=p.userData;
    if (!ud.moveAxis) continue;
    const v=Math.sin(elapsed*ud.moveSpeed+ud.phase)*ud.moveRange;
    if (ud.moveAxis==='x') p.position.x=ud.baseX+v;
    if (ud.moveAxis==='z') p.position.z=ud.baseZ+v;
    if (ud.moveAxis==='y') p.position.y=ud.baseY+v;
  }

  // ── Acceleration — ice has low grip ──
  const accel = onGround ? (isOnIce ? 2 : 18) : 7;
  vel.x+=(dir.x*SPEED-vel.x)*accel*dt;
  vel.z+=(dir.z*SPEED-vel.z)*accel*dt;

  // ── Coyote + jump buffer ──
  if (onGround) coyoteTime=0.13; else coyoteTime-=dt;
  if (keys['Space']) jumpBuffer=0.18;
  else jumpBuffer-=dt;

  if (jumpBuffer>0&&coyoteTime>0) {
    // Inherit moving platform velocity
    if (currentPlatform&&currentPlatform.userData.moveAxis) {
      const ud=currentPlatform.userData;
      const spd=ud.moveSpeed, rng=ud.moveRange, ph=ud.phase;
      const pvel=Math.cos(elapsed*spd+ph)*spd*rng;
      if (ud.moveAxis==='x') vel.x+=pvel*0.5;
      if (ud.moveAxis==='z') vel.z+=pvel*0.5;
      if (ud.moveAxis==='y') vel.y+=Math.abs(pvel)*0.3;
    }
    vel.y=JUMP_V; coyoteTime=0; jumpBuffer=0;
    sfx.jump();
  }

  // ── Gravity ──
  vel.y-=GRAV*dt;

  // ── Move + collide ──
  playerMesh.position.x+=vel.x*dt;
  playerMesh.position.z+=vel.z*dt;
  playerMesh.position.y+=vel.y*dt;
  resolveCollisions();

  // ── Landing effect ──
  if (onGround&&!wasOnGround) {
    sfx.land();
    spawnDust(new THREE.Vector3(playerMesh.position.x, playerMesh.position.y+0.1, playerMesh.position.z));
  }
  wasOnGround=onGround;

  // ── Rotate player ──
  if (moving) {
    const tgt=Math.atan2(dir.x,dir.z);
    playerMesh.rotation.y=THREE.MathUtils.lerp(playerMesh.rotation.y,tgt,Math.min(1,12*dt));
  }

  // ── Animate limbs ──
  const wp=elapsed*7, sw=moving?Math.sin(wp)*0.55:0;
  const ud2=playerMesh.userData;
  ud2.legL.rotation.x=sw; ud2.legR.rotation.x=-sw;
  ud2.armL.rotation.x=-sw; ud2.armR.rotation.x=sw;

  // Squash & stretch
  const tSY=onGround?1:(vel.y>0?1.18:0.88);
  const tSX=onGround?1:(vel.y>0?0.88:1.06);
  playerMesh.scale.y=THREE.MathUtils.lerp(playerMesh.scale.y,tSY,Math.min(1,12*dt));
  playerMesh.scale.x=THREE.MathUtils.lerp(playerMesh.scale.x,tSX,Math.min(1,12*dt));
  playerMesh.scale.z=playerMesh.scale.x;

  // ── Animate world objects ──
  if (goalMesh) {
    goalMesh.rotation.y+=dt*1.2;
    goalMesh.userData.ring.rotation.x+=dt*2;
    goalMesh.userData.light.intensity=1.5+Math.sin(elapsed*3)*0.5;
  }
  for (const coin of coinMeshes) {
    if (coin.userData.collected) continue;
    coin.rotation.y+=dt*2.5;
    coin.position.y=coin.userData.baseY+Math.sin(elapsed*2+coin.position.x)*0.1;
  }

  // ── Shadow blob ──
  updateShadowBlob();

  // ── Particles ──
  updateParticles(dt);

  // ── Death ──
  const deathY=lvl.deathY!==undefined?lvl.deathY:-12;
  if (playerMesh.position.y<deathY) {
    spawnDeathBurst(playerMesh.position.clone().add(new THREE.Vector3(0,0.5,0)));
    sfx.die(); lives--; updateHUD();
    if (lives<=0) {
      state='gameover';
      showMsg('GAME OVER','⭐ '+score+' stars<br><small style="color:#777">click or SPACE — restart</small>');
    } else {
      state='dead';
      showMsg('💀 YOU DIED','Lives: '+'❤️'.repeat(lives)+'<br><small style="color:#777">click or SPACE — continue</small>');
    }
    return;
  }

  // ── Coin pickup ──
  const pc=new THREE.Vector3(playerMesh.position.x,playerMesh.position.y+PLAYER_H/2,playerMesh.position.z);
  for (const coin of coinMeshes) {
    if (coin.userData.collected) continue;
    if (pc.distanceTo(coin.position)<1.1) {
      coin.userData.collected=true; scene.remove(coin);
      score++; updateHUD(); sfx.coin();
      spawnCoinBurst(coin.position.clone());
    }
  }

  // ── Goal ──
  const gp=new THREE.Vector3(lvl.goal.x,lvl.goal.y,lvl.goal.z);
  if (playerMesh.position.distanceTo(gp)<1.6) {
    timerRunning=false;
    if (!bestTimes[levelIdx]||levelTimer<bestTimes[levelIdx]) bestTimes[levelIdx]=levelTimer;
    spawnConfetti(gp); sfx.win();
    updateHUD();
    if (levelIdx+1>=LEVELS.length) {
      state='win';
      showMsg('🏆 YOU WIN!','⭐ '+score+' stars &nbsp; ⏱ '+fmtTime(levelTimer)+'<br><small style="color:#777">click or SPACE — play again</small>');
    } else {
      state='levelcomplete';
      showMsg('✅ LEVEL COMPLETE!','Level '+(levelIdx+1)+' — '+LEVELS[levelIdx].name+'<br>⭐ '+score+' &nbsp; ⏱ '+fmtTime(levelTimer)+'<br><small style="color:#777">click or SPACE — next level</small>');
    }
    return;
  }

  // ── Camera ──
  updateCamera(dt);
}

// ═══════════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════════

const clock = new THREE.Clock();
function loop() {
  requestAnimationFrame(loop);
  update(Math.min(clock.getDelta(), 0.05));
  renderer.render(scene, camera);
}

camera.position.copy(camPos);
loop();
</script>
